name: Backend CI

on:
  push:
    branches: [ main, feature/structure, setup/tests-and-ci ]
  pull_request:
    branches: [ main, feature/structure ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
